name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Inject deterministic build identifier (short SHA) into all __BUILD__ placeholders.
      # This auto-busts caches on every push without manual ?v= updates.
      - name: Inject build identifier
        run: |
          BUILD_ID="$(git rev-parse --short HEAD)"
          echo "Build ID: $BUILD_ID"
          find . -maxdepth 3 -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "*.css" \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            -exec sed -i "s|__BUILD__|$BUILD_ID|g" {} +
          echo "✓ Build ID $BUILD_ID injected"

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
